<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>走路地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --green: #2ecc71;
    --green-dark: #27ae60;
    --blue: #3498db;
    --orange: #f39c12;
    --red: #e74c3c;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2c3e50;
    --text-muted: #7f8c8d;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    padding: 16px 16px 20px;
    text-align: center;
  }
  .header h1 { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }
  .header p  { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 3px; }

  .status-bar {
    display: flex; gap: 8px; padding: 10px 12px;
    background: var(--card); border-bottom: 1px solid #e8ecef; flex-wrap: wrap;
  }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; background: #f0f4f8; color: var(--text-muted);
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #bdc3c7; flex-shrink: 0; }
  .status-pill.active { background: #eafaf1; color: #27ae60; }
  .status-pill.active .dot { background: #2ecc71; animation: pulse 1.5s infinite; }
  .status-pill.bt-on { background: #eaf4fb; color: #2980b9; }
  .status-pill.bt-on .dot { background: #3498db; }
  .status-pill.sim-on { background: #fef9e7; color: #d68910; }
  .status-pill.sim-on .dot { background: #f39c12; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }

  #map { width: 100%; height: 280px; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .stat-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 12px; text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .stat-card .label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .stat-card .value { font-size: 32px; font-weight: 900; line-height: 1; color: var(--green-dark); }
  .stat-card .unit  { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }

  .btn-group { display: flex; flex-direction: column; gap: 9px; padding: 0 12px 12px; }
  .btn-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

  .btn {
    width: 100%; padding: 14px 10px; border: none; border-radius: var(--radius);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    cursor: pointer; transition: all 0.12s; letter-spacing: 0.2px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    -webkit-user-select: none; user-select: none;
  }
  .btn:active  { transform: scale(0.96); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

  .btn-start { background: linear-gradient(135deg,#2ecc71,#27ae60); color:#fff; box-shadow:0 4px 12px rgba(46,204,113,.35); }
  .btn-stop  { background: linear-gradient(135deg,#e74c3c,#c0392b); color:#fff; box-shadow:0 4px 12px rgba(231,76,60,.35); }
  .btn-bt    { background: linear-gradient(135deg,#3498db,#2980b9); color:#fff; box-shadow:0 4px 12px rgba(52,152,219,.35); }
  .btn-sim   { background: linear-gradient(135deg,#f39c12,#d68910); color:#fff; box-shadow:0 4px 12px rgba(243,156,18,.35); }
  .btn-reset { background: var(--card); color: var(--text-muted); border: 1.5px solid #dde1e7; }

  .log-section { padding: 0 12px 20px; }
  .log-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  #log {
    background: var(--card); border-radius: 12px; padding: 10px 12px;
    font-size: 11px; color: var(--text-muted);
    min-height: 52px; max-height: 100px; overflow-y: auto; line-height: 1.8;
  }
  .log-item { border-bottom: 1px solid #f0f4f8; padding: 1px 0; }
  .log-item:last-child { border: none; }
  .log-ok   { color: #27ae60; }
  .log-err  { color: #e74c3c; }
  .log-info { color: #3498db; }
  .log-sim  { color: #d68910; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border-radius: 24px; padding: 28px 20px;
    width: 100%; max-width: 340px; text-align: center;
    animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
  .modal .trophy { font-size: 52px; margin-bottom: 10px; }
  .modal h2 { font-size: 20px; font-weight: 900; margin-bottom: 16px; }
  .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .modal-stat { background: var(--bg); border-radius: 14px; padding: 12px 8px; }
  .modal-stat .v { font-size: 28px; font-weight: 900; color: var(--green-dark); }
  .modal-stat .l { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 2px; }
  .modal-sim-note { font-size: 11px; color: #d68910; background: #fef9e7; border-radius: 8px; padding: 6px 10px; margin-bottom: 14px; }
  .modal-close {
    width: 100%; padding: 13px; border-radius: 14px;
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color: #fff; font-family: 'Nunito',sans-serif;
    font-size: 14px; font-weight: 800; border: none; cursor: pointer;
  }
  .note { font-size: 10px; color: var(--text-muted); text-align: center; padding: 0 12px 16px; line-height: 1.6; }

  /* ── Pet Section ── */
  .pet-section {
    margin: 0 12px 12px;
    background: linear-gradient(135deg, #fef9f0, #fff8e8);
    border-radius: var(--radius);
    border: 2px solid #fdecc8;
    padding: 14px 14px 12px;
    position: relative;
    overflow: hidden;
  }
  .pet-section::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(255,200,80,.12), transparent 60%);
    pointer-events: none;
  }
  .pet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .pet-title { font-size: 12px; font-weight: 800; color: #b7791f; text-transform: uppercase; letter-spacing: 0.5px; }
  .pet-level-badge {
    font-size: 10px; font-weight: 800; background: #fbd38d;
    color: #7b4f12; padding: 2px 8px; border-radius: 20px;
  }
  .pet-steps-avail {
    font-size: 11px; font-weight: 800; color: #7b4f12;
    background: #eafaf1; border: 1.5px solid #a9dfbf;
    border-radius: 20px; padding: 3px 10px;
    display: flex; align-items: center; gap: 4px;
  }
  .pet-steps-avail .avail-num { color: #27ae60; font-size: 14px; }

  .pet-stage {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 14px; margin-bottom: 10px;
  }
  .pet-canvas-wrap {
    position: relative; width: 90px; height: 90px; flex-shrink: 0;
    cursor: pointer;
  }
  .pet-canvas-wrap canvas { position: absolute; inset: 0; }

  .pet-info { flex: 1; }
  .pet-name { font-size: 16px; font-weight: 900; color: #7b4f12; margin-bottom: 6px; line-height: 1; }
  .pet-mood { font-size: 11px; color: #a0724a; margin-bottom: 8px; font-weight: 600; }

  .pet-bars { display: flex; flex-direction: column; gap: 5px; }
  .pet-bar-row { display: flex; align-items: center; gap: 6px; }
  .pet-bar-label { font-size: 10px; font-weight: 700; color: #a0724a; width: 24px; flex-shrink: 0; }
  .pet-bar-track {
    flex: 1; height: 7px; background: #fde8c0; border-radius: 4px; overflow: hidden;
  }
  .pet-bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.5s ease;
  }
  .bar-happy  { background: linear-gradient(90deg, #f6d365, #fda085); }
  .bar-energy { background: linear-gradient(90deg, #84fab0, #08d4a0); }
  .bar-exp    { background: linear-gradient(90deg, #a18cd1, #fbc2eb); }
  .pet-bar-val { font-size: 10px; font-weight: 700; color: #a0724a; width: 26px; text-align: right; flex-shrink: 0; }

  .pet-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
  .pet-btn {
    padding: 8px 4px; border: none; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800;
    cursor: pointer; transition: all 0.12s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: rgba(255,255,255,0.8); color: #7b4f12;
    border: 1.5px solid #fbd38d;
  }
  .pet-btn:active { transform: scale(0.93); }
  .pet-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .pet-btn .pet-btn-icon { font-size: 18px; line-height: 1; }
  .pet-btn .pet-btn-cost { font-size: 9px; color: #a0724a; font-weight: 600; }

  .pet-toast {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: #7b4f12; color: #fff; font-size: 11px; font-weight: 800;
    padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 10;
  }
  .pet-toast.show { opacity: 1; }

  @keyframes petBounce {
    0%,100% { transform: translateY(0); }
    40%      { transform: translateY(-10px); }
    60%      { transform: translateY(-5px); }
  }
  @keyframes petShake {
    0%,100% { transform: rotate(0deg); }
    25%      { transform: rotate(-8deg); }
    75%      { transform: rotate(8deg); }
  }
  @keyframes petSpin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .pet-anim-bounce { animation: petBounce 0.5s ease; }
  .pet-anim-shake  { animation: petShake 0.4s ease; }
  .pet-anim-spin   { animation: petSpin 0.6s ease; }
</style>
</head>
<body>

<div class="header">
  <h1>走路地圖 🗺️</h1>
  <p>記錄你走過的路，看看你走了多遠！</p>
</div>

<div class="status-bar">
  <div class="status-pill" id="gps-pill"><div class="dot"></div><span>GPS 待機</span></div>
  <div class="status-pill" id="bt-pill"><div class="dot"></div><span>micro:bit 未連線</span></div>
  <div class="status-pill" id="sim-pill" style="display:none"><div class="dot"></div><span>模擬模式</span></div>
</div>

<div id="map"></div>

<div class="stats">
  <div class="stat-card">
    <div class="label">步數</div>
    <div class="value" id="step-display">0</div>
    <div class="unit">步</div>
  </div>
  <div class="stat-card">
    <div class="label">距離</div>
    <div class="value" id="dist-display">0</div>
    <div class="unit">公尺</div>
  </div>
  <div class="stat-card">
    <div class="label">座標點</div>
    <div class="value" id="pts-display">0</div>
    <div class="unit">個</div>
  </div>
  <div class="stat-card">
    <div class="label">狀態</div>
    <div class="value" id="state-display" style="font-size:16px;padding-top:8px;">待機</div>
    <div class="unit" id="state-sub">按開始走路</div>
  </div>
</div>

<div class="btn-group">
  <button class="btn btn-start" id="btn-start" onclick="startWalk()">開始走路</button>
  <button class="btn btn-stop"  id="btn-stop"  onclick="stopWalk()" disabled>結束走路</button>
  <div class="btn-row">
    <button class="btn btn-bt"  id="btn-bt"  onclick="connectBluetooth()">連線 micro:bit</button>
    <button class="btn btn-sim" id="btn-sim" onclick="simulateStep()" disabled>模擬走路</button>
  </div>
  <button class="btn btn-reset" id="btn-reset" onclick="resetAll()" disabled>重新開始</button>
</div>

<div class="log-section">
  <div class="log-title">系統訊息</div>
  <div id="log"><div class="log-item log-info">等待開始走路...</div></div>
</div>

<!-- Pet Section -->
<div class="pet-section">
  <div class="pet-toast" id="pet-toast">+10 開心！</div>
  <div class="pet-header">
    <span class="pet-title">🐾 我的寵物</span>
    <span class="pet-steps-avail">🦶 可用 <span class="avail-num" id="pet-avail-steps">0</span> 步</span>
    <span class="pet-level-badge" id="pet-level-badge">Lv.1 蛋</span>
  </div>
  <div class="pet-stage">
    <div class="pet-canvas-wrap" id="pet-wrap" onclick="petPoke()">
      <canvas id="pet-canvas" width="90" height="90"></canvas>
    </div>
    <div class="pet-info">
      <div class="pet-name" id="pet-name">神秘蛋</div>
      <div class="pet-mood" id="pet-mood">💤 靜靜等待...</div>
      <div class="pet-bars">
        <div class="pet-bar-row">
          <div class="pet-bar-label">😊</div>
          <div class="pet-bar-track"><div class="pet-bar-fill bar-happy" id="bar-happy" style="width:60%"></div></div>
          <div class="pet-bar-val" id="val-happy">60</div>
        </div>
        <div class="pet-bar-row">
          <div class="pet-bar-label">⚡</div>
          <div class="pet-bar-track"><div class="pet-bar-fill bar-energy" id="bar-energy" style="width:80%"></div></div>
          <div class="pet-bar-val" id="val-energy">80</div>
        </div>
        <div class="pet-bar-row">
          <div class="pet-bar-label">✨</div>
          <div class="pet-bar-track"><div class="pet-bar-fill bar-exp" id="bar-exp" style="width:0%"></div></div>
          <div class="pet-bar-val" id="val-exp">0</div>
        </div>
      </div>
    </div>
  </div>
  <div class="pet-actions">
    <button class="pet-btn" id="pet-feed" onclick="petFeed()">
      <span class="pet-btn-icon">🍖</span>
      <span>餵食</span>
      <span class="pet-btn-cost" id="cost-feed">30步</span>
    </button>
    <button class="pet-btn" id="pet-play" onclick="petPlay()">
      <span class="pet-btn-icon">🎾</span>
      <span>玩耍</span>
      <span class="pet-btn-cost" id="cost-play">50步</span>
    </button>
    <button class="pet-btn" id="pet-sleep" onclick="petSleep()">
      <span class="pet-btn-icon">😴</span>
      <span>休息</span>
      <span class="pet-btn-cost" id="cost-sleep">0步</span>
    </button>
  </div>
</div>

<p class="note">連線 micro:bit 需使用 Chrome 或 Edge ・ 走路時請允許位置存取權限</p>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="trophy">🏆</div>
    <h2>走路完成！</h2>
    <div id="sim-note" class="modal-sim-note" style="display:none">模擬模式 — 座標為虛擬資料</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="v" id="m-steps">0</div><div class="l">步數</div></div>
      <div class="modal-stat"><div class="v" id="m-dist">0</div><div class="l">公尺</div></div>
      <div class="modal-stat"><div class="v" id="m-pts">0</div><div class="l">座標點</div></div>
      <div class="modal-stat"><div class="v" id="m-time">0</div><div class="l">分鐘</div></div>
    </div>
    <button class="modal-close" onclick="closeModal()">查看地圖軌跡</button>
  </div>
</div>

<script>
let map, polyline, startMarker, endMarker;
let coords = [];
let gpsWatcher = null;
let isWalking = false;
let stepCount = 0;
let startTime = null;
let btDevice = null, btChar = null;
let simInterval = null;
let isSimMode = false;
let simLat = 25.0330, simLng = 121.5335;

map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
map.setView([simLat, simLng], 17);

// 開啟時自動定位到真實位置
let myLocationMarker = null;
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      simLat = pos.coords.latitude;
      simLng = pos.coords.longitude;
      map.setView([simLat, simLng], 17);
      // 顯示綠色目前位置點
      myLocationMarker = L.circleMarker([simLat, simLng], {
        radius: 10, fillColor: '#2ecc71', color: '#fff',
        weight: 3, fillOpacity: 1
      }).addTo(map).bindPopup('📍 你在這裡').openPopup();
      log('已定位到你的位置 📍', 'ok');
    },
    () => { log('無法取得位置，使用預設台北座標', 'err'); },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

polyline = L.polyline([], {
  color: '#2ecc71', weight: 5, opacity: 0.9, lineCap: 'round', lineJoin: 'round'
}).addTo(map);

function log(msg, type='info') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-item log-' + type;
  const t = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  div.textContent = '[' + t + '] ' + msg;
  el.prepend(div);
}

function startWalk() {
  coords = []; isWalking = true; startTime = Date.now();
  polyline.setLatLngs([]);
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map.removeLayer(endMarker);   endMarker = null; }

  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  document.getElementById('btn-sim').disabled   = true;
  document.getElementById('state-display').textContent = '走路中';
  document.getElementById('state-sub').textContent = '記錄 GPS 中';

  if (navigator.geolocation) {
    const p = document.getElementById('gps-pill');
    p.className = 'status-pill active';
    p.innerHTML = '<div class="dot"></div><span>GPS 記錄中</span>';
    gpsWatcher = navigator.geolocation.watchPosition(onGPS,
      e => { log('GPS 錯誤：' + e.message, 'err'); log('提示：可按「模擬走路」測試', 'sim'); },
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
    );
    log('開始記錄 GPS', 'ok');
  } else {
    log('此裝置不支援 GPS，請使用模擬走路', 'err');
  }
}

function onGPS(pos) {
  if (!isWalking) return;
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  if (accuracy > 50) return;
  addCoord(lat, lng);
  map.panTo([lat, lng]);
}

function addCoord(lat, lng) {
  coords.push([lat, lng]);
  polyline.setLatLngs(coords);
  if (coords.length === 1) {
    if (myLocationMarker) { map.removeLayer(myLocationMarker); myLocationMarker = null; }
    startMarker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: '#2ecc71', color: '#fff', weight: 2, fillOpacity: 1
    }).addTo(map).bindPopup('起點');
    map.setView([lat, lng], 18);
  }
  document.getElementById('pts-display').textContent = coords.length;
  document.getElementById('dist-display').textContent = Math.round(calcDistance());
  log('座標 #' + coords.length + '：' + lat.toFixed(5) + ', ' + lng.toFixed(5));
}

function simulateStep() {
  if (!isSimMode) {
    isSimMode = true;
    const p = document.getElementById('sim-pill');
    p.style.display = 'flex';
    p.className = 'status-pill sim-on';
    p.innerHTML = '<div class="dot"></div><span>模擬中</span>';
    document.getElementById('btn-sim').textContent = '停止模擬';
    log('模擬走路開始', 'sim');

    simInterval = setInterval(() => {
      if (!isWalking) { stopSimulate(); return; }
      simLat += (Math.random() - 0.3) * 0.00008;
      simLng += (Math.random() + 0.1) * 0.00010;
      addCoord(simLat, simLng);
      map.panTo([simLat, simLng]);
      stepCount += Math.floor(Math.random() * 3) + 2;
      document.getElementById('step-display').textContent = stepCount;
      document.getElementById('dist-display').textContent = Math.round(calcDistance());
    }, 1200);
  } else {
    stopSimulate();
  }
}

function stopSimulate() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  isSimMode = false;
  const p = document.getElementById('sim-pill');
  p.className = 'status-pill';
  p.innerHTML = '<div class="dot"></div><span>模擬已停止</span>';
  document.getElementById('btn-sim').textContent = '模擬走路';

function stopWalk() {

  stopSimulate();
  if (gpsWatcher !== null) { navigator.geolocation.clearWatch(gpsWatcher); gpsWatcher = null; }
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-sim').disabled  = true;

    endMarker = L.circleMarker(last, {
      radius: 8, fillColor: '#e74c3c', color: '#fff', weight: 2, fillOpacity: 1
    }).addTo(map).bindPopup('終點');

  log('走路結束', 'ok');
  document.getElementById('btn-reset').disabled = false;
  showModal();
}

async function connectBluetooth() {
  if (!navigator.bluetooth) { log('請使用 Chrome 或 Edge 瀏覽器', 'err'); return; }
  try {
    // 用 btConnected 旗標判斷，不依賴手機不可靠的 gatt.connected
    if (btDevice && !btConnected) {
      log('重新連線中...', 'info');
      await doConnect(btDevice);
      return;
    }
    log('搜尋 micro:bit...', 'info');
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
    });
    btDevice.addEventListener('gattserverdisconnected', onDisconnected);
    log('找到：' + btDevice.name, 'ok');
    await doConnect(btDevice);
  } catch(e) { log('藍牙失敗：' + e.message, 'err'); }
}

async function doConnect(device) {
  try {
    // 先確保舊連線完全斷開
    if (device.gatt.connected) {
      try { device.gatt.disconnect(); } catch(e) {}
      await new Promise(r => setTimeout(r, 500));
    }
    const server = await device.gatt.connect();
    const p = document.getElementById('bt-pill');
    p.className = 'status-pill bt-on';
    p.innerHTML = '<div class="dot"></div><span>' + device.name + '</span>';
    // 重連時重新取得 service 和 characteristic
    const svc = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
    btChar = await svc.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
    // 停止舊的 notification 再重新啟動
    try { await btChar.stopNotifications(); } catch(e) {}
    await btChar.startNotifications();
    btChar.removeEventListener('characteristicvaluechanged', onBTData);
    btChar.addEventListener('characteristicvaluechanged', onBTData);
    btConnected = true;
    lastBTDataTime = Date.now();
    log('連線成功，開始接收步數', 'ok');
  } catch(e) {
    btConnected = false;
    log('連線失敗：' + e.message, 'err');
  }
}

function onDisconnected() {
  const p = document.getElementById('bt-pill');
  if (p.className !== 'status-pill bt-on') return;
  btConnected = false;
  lastBTDataTime = 0;
  p.className = 'status-pill';
  p.innerHTML = '<div class="dot"></div><span>已斷線，按此重連</span>';
  log('藍牙斷線！按「連線 micro:bit」重連', 'err');
}

// 用「最後收到資料的時間」偵測斷線（手機最可靠的方式）
// micro:bit 每秒發一次，超過 8 秒沒收到就視為斷線
let lastBTDataTime = 0;
let btConnected = false;
setInterval(() => {
  if (!btConnected) return;
  const now = Date.now();
  if (lastBTDataTime > 0 && now - lastBTDataTime > 8000) {
    btConnected = false;
    lastBTDataTime = 0;
    onDisconnected();
  }
}, 1000);

function onBTData(event) {
  lastBTDataTime = Date.now();
  const value = new TextDecoder().decode(event.target.value).trim();
  if (value.startsWith('STEPS:')) {
    const n = parseInt(value.split(':')[1]);
    if (!isNaN(n)) {
      stepCount = n;
      document.getElementById('step-display').textContent = n;
      document.getElementById('dist-display').textContent = Math.max(Math.round(calcDistance()), Math.round(n * 0.6));
      document.getElementById('pet-avail-steps').textContent = availSteps();
      log('步數更新：' + n + ' 步', 'ok');
    }
  }
}

let pet = {
  happy: 60, energy: 80, exp: 0, level: 1,
  isSleeping: false, spentSteps: 0,
  animTimeout: null,
};

let petAnimFrame = null;
let petEyeState = { blink: 0, blinkTimer: 0, lookX: 0, lookY: 0, lookTimer: 0 };

function getPetStage() {
  let stage = PET_STAGES[0];
  for (const s of PET_STAGES) { if (pet.level >= s.minLv) stage = s; }
  return stage;
}

function updatePetUI() {
  const stage = getPetStage();
  document.getElementById('pet-name').textContent = stage.name;
  document.getElementById('pet-level-badge').textContent = stage.badge;
  document.getElementById('pet-avail-steps').textContent = availSteps();
  const moodArr = stage.mood;
  let moodIdx = 0;
  if (pet.isSleeping) moodIdx = moodArr.length - 1;
  else if (pet.happy > 70) moodIdx = 0;
  else if (pet.happy > 40) moodIdx = Math.min(1, moodArr.length-1);
  else moodIdx = moodArr.length - 1;
  document.getElementById('pet-mood').textContent = moodArr[moodIdx];

  document.getElementById('bar-happy').style.width  = pet.happy  + '%';
  document.getElementById('bar-energy').style.width = pet.energy + '%';
  const expPct = Math.min((pet.exp % 100), 100);
  document.getElementById('bar-exp').style.width    = expPct + '%';
  document.getElementById('val-happy').textContent  = pet.happy;
  document.getElementById('val-energy').textContent = pet.energy;
  document.getElementById('val-exp').textContent    = pet.exp % 100;
}

function availSteps() { return stepCount - pet.spentSteps; }

function showPetToast(msg) {
  const el = document.getElementById('pet-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function petAnimate(cls) {
  const wrap = document.getElementById('pet-wrap');
  wrap.classList.remove('pet-anim-bounce','pet-anim-shake','pet-anim-spin');
  void wrap.offsetWidth;
  wrap.classList.add(cls);
  clearTimeout(pet.animTimeout);
  pet.animTimeout = setTimeout(() => wrap.classList.remove(cls), 700);
}

function petFeed() {
  const cost = 30;
  if (pet.isSleeping) { showPetToast('牠在睡覺！先叫醒牠 😴'); petAnimate('pet-anim-shake'); return; }
  if (availSteps() < cost) { showPetToast('步數不夠！再走走吧 🚶'); petAnimate('pet-anim-shake'); return; }
  pet.spentSteps += cost;
  pet.happy  = Math.min(100, pet.happy + 20);
  pet.energy = Math.min(100, pet.energy + 10);
  pet.exp += 15; checkLevelUp();
  petAnimate('pet-anim-bounce');
  showPetToast('好好吃！😋 +20開心 +15經驗');
  updatePetUI();
  log('寵物餵食，花費 ' + cost + ' 步', 'ok');
}

function petPlay() {
  const cost = 50;
  if (pet.isSleeping) { showPetToast('牠在睡覺！先叫醒牠 😴'); petAnimate('pet-anim-shake'); return; }
  if (availSteps() < cost) { showPetToast('步數不夠！再走走吧 🚶'); petAnimate('pet-anim-shake'); return; }
  if (pet.energy < 20)     { showPetToast('寵物太累了，先讓牠休息！'); petAnimate('pet-anim-shake'); return; }
  pet.spentSteps += cost;
  pet.happy  = Math.min(100, pet.happy + 30);
  pet.energy = Math.max(0, pet.energy - 20);
  pet.exp += 25; checkLevelUp();
  petAnimate('pet-anim-spin');
  showPetToast('好開心！🎉 +30開心 +25經驗');
  updatePetUI();
  log('寵物玩耍，花費 ' + cost + ' 步', 'ok');
}

function petSleep() {
  if (pet.isSleeping) {
    pet.isSleeping = false;
    showPetToast('起床囉！☀️');
    petAnimate('pet-anim-bounce');
  } else {
    pet.isSleeping = true;
    pet.energy = Math.min(100, pet.energy + 40);
    showPetToast('晚安 😴 +40體力');
    petAnimate('pet-anim-shake');
  }
  updatePetUI();
}

function petPoke() {
  if (pet.isSleeping) { showPetToast('嘿！別吵我睡覺！😠'); petAnimate('pet-anim-shake'); return; }
  pet.happy = Math.min(100, pet.happy + 5);
  pet.exp += 3; checkLevelUp();
  showPetToast('摸摸～🥰 +5開心');
  petAnimate('pet-anim-bounce');
  updatePetUI();
}

function checkLevelUp() {
  const newLv = 1 + Math.floor(pet.exp / 100);
  if (newLv > pet.level) {
    pet.level = newLv;
    const stage = getPetStage();
    showPetToast('升級！' + stage.badge + ' 🎊');
    log('寵物升級！現在是 ' + stage.badge, 'ok');
  }
}

// ── Pet Canvas Drawing ───────────────────────────────────────
function drawPet() {
  const canvas = document.getElementById('pet-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const level = pet.level;
  const sleeping = pet.isSleeping;

  // eye blink logic
  petEyeState.blinkTimer--;
  if (petEyeState.blinkTimer <= 0) {
    petEyeState.blink = 1;
    petEyeState.blinkTimer = 80 + Math.random() * 120;
  }
  if (petEyeState.blink > 0) petEyeState.blink++;
  if (petEyeState.blink > 6) petEyeState.blink = 0;

  petEyeState.lookTimer--;
  if (petEyeState.lookTimer <= 0) {
    petEyeState.lookX = (Math.random() - 0.5) * 3;
    petEyeState.lookY = (Math.random() - 0.5) * 2;
    petEyeState.lookTimer = 60 + Math.random() * 80;
  }

  const cx = W / 2, cy = H / 2 + 4;

  if (level < 2)       drawBabySlime(ctx, cx, cy, sleeping);
  else if (level < 5)  drawBunny(ctx, cx, cy, sleeping, level);
  else if (level < 10) drawDragon(ctx, cx, cy, sleeping, level);
  else if (level < 20) drawNinja(ctx, cx, cy, sleeping, level);
  else                 drawGodBeast(ctx, cx, cy, sleeping);

  petAnimFrame = requestAnimationFrame(drawPet);
}

// ── Lv.1: Baby Slime ── 超可愛果凍小史萊姆
function drawBabySlime(ctx, cx, cy, sleeping) {
  const t = Date.now() / 1000;
  const squish = Math.sin(t * 2) * 0.06;
  ctx.save(); ctx.translate(cx, cy);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, 26, 16, 4, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fill();

  // body - jiggly slime shape
  ctx.save(); ctx.scale(1 + squish, 1 - squish);
  ctx.beginPath();
  ctx.moveTo(-20, 8);
  ctx.bezierCurveTo(-22, -10, -14, -26, 0, -26);
  ctx.bezierCurveTo(14, -26, 22, -10, 20, 8);
  ctx.bezierCurveTo(14, 22, -14, 22, -20, 8);
  const g = ctx.createRadialGradient(-6, -10, 2, 0, 0, 26);
  g.addColorStop(0, '#b5f5ff'); g.addColorStop(0.6, '#5de0f5'); g.addColorStop(1, '#00b4d8');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#0096c7'; ctx.lineWidth = 1.5; ctx.stroke();

  // shine blob
  ctx.beginPath(); ctx.ellipse(-7, -14, 5, 3, -0.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-4, -8, 2, 1.5, -0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
  ctx.restore();

  // antennae
  ctx.strokeStyle = '#0096c7'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, -24); ctx.quadraticCurveTo(-12, -34, -10, -38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -24); ctx.quadraticCurveTo(12, -34, 10, -38); ctx.stroke();
  ctx.fillStyle = '#ff6b9d';
  ctx.beginPath(); ctx.arc(-10, -38, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -38, 3, 0, Math.PI*2); ctx.fill();

  // face
  if (!sleeping) {
    drawCuteEyes(ctx, -8, -4, 8, -4, 5, petEyeState);
    drawCuteMouth(ctx, 0, 6, sleeping, pet.happy);
  } else {
    drawSleepEyes(ctx, -8, -4, 8, -4);
    ctx.restore(); ctx.save(); ctx.translate(cx, cy);
    drawZzz(ctx, 18, -28);
  }
  ctx.restore();
}

// ── Lv.2~4: Bunny ── 彩色大耳兔
function drawBunny(ctx, cx, cy, sleeping, level) {
  const t = Date.now() / 1000;
  const bob = Math.sin(t * 2.2) * 3;
  const earWig = Math.sin(t * 1.5) * 0.12;
  const palettes = [
    ['#ffb3c6','#ff85a1','#ff4d79'],
    ['#c8f5a0','#90e850','#5cb800'],
    ['#c3b1e1','#9b72cf','#6a0dad'],
  ];
  const [light, mid, dark] = palettes[(level - 2) % 3];
  ctx.save(); ctx.translate(cx, cy + bob);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, 30, 18, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.09)'; ctx.fill();

  // left ear
  ctx.save(); ctx.translate(-10, -28); ctx.rotate(-earWig);
  ctx.beginPath(); ctx.ellipse(0, -14, 7, 16, -0.15, 0, Math.PI*2);
  ctx.fillStyle = mid; ctx.fill(); ctx.strokeStyle = dark; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, -14, 4, 12, -0.15, 0, Math.PI*2);
  ctx.fillStyle = light; ctx.fill();
  ctx.restore();

  // right ear
  ctx.save(); ctx.translate(10, -28); ctx.rotate(earWig);
  ctx.beginPath(); ctx.ellipse(0, -14, 7, 16, 0.15, 0, Math.PI*2);
  ctx.fillStyle = mid; ctx.fill(); ctx.strokeStyle = dark; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, -14, 4, 12, 0.15, 0, Math.PI*2);
  ctx.fillStyle = light; ctx.fill();
  ctx.restore();

  // body
  ctx.beginPath(); ctx.ellipse(0, 12, 20, 18, 0, 0, Math.PI*2);
  const bg = ctx.createRadialGradient(-5, 4, 2, 0, 12, 22);
  bg.addColorStop(0, light); bg.addColorStop(1, mid);
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = dark; ctx.lineWidth = 1.5; ctx.stroke();

  // belly
  ctx.beginPath(); ctx.ellipse(0, 16, 11, 12, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();

  // head
  ctx.beginPath(); ctx.ellipse(0, -10, 18, 17, 0, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = dark; ctx.lineWidth = 1.5; ctx.stroke();

  // cheeks
  ctx.fillStyle = 'rgba(255,120,150,0.25)';
  ctx.beginPath(); ctx.ellipse(-11, -6, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11, -6, 6, 4, 0, 0, Math.PI*2); ctx.fill();

  // tiny tail
  ctx.beginPath(); ctx.arc(17, 16, 5, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();

  if (!sleeping) {
    drawCuteEyes(ctx, -7, -12, 7, -12, 5.5, petEyeState);
    drawCuteMouth(ctx, 0, -2, sleeping, pet.happy);
    // nose
    ctx.fillStyle = '#ff85a1';
    ctx.beginPath(); ctx.arc(0, -6, 2, 0, Math.PI*2); ctx.fill();
  } else {
    drawSleepEyes(ctx, -7, -12, 7, -12);
    drawZzz(ctx, 22, -30);
  }
  ctx.restore();
}

// ── Lv.5~9: Dragon ── 迷你噴火龍
function drawDragon(ctx, cx, cy, sleeping, level) {
  const t = Date.now() / 1000;
  const bob = Math.sin(t * 1.8) * 3;
  const wingFlap = Math.sin(t * 4) * 0.3;
  const hue = ((level - 5) / 4) * 60; // 0=紅, 60=橘
  const col  = `hsl(${hue + 10},90%,55%)`;
  const col2 = `hsl(${hue + 10},90%,38%)`;
  const colL = `hsl(${hue + 20},90%,72%)`;

  ctx.save(); ctx.translate(cx, cy + bob);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, 32, 20, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fill();

  // wings
  ctx.save(); ctx.translate(-18, -4); ctx.rotate(-0.3 - wingFlap);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-20,-10,-28,-4,-22,12); ctx.bezierCurveTo(-14,8,-6,6,0,0);
  ctx.fillStyle = `hsl(${hue+30},85%,60%)`; ctx.fill();
  ctx.strokeStyle = col2; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  ctx.save(); ctx.translate(18, -4); ctx.rotate(0.3 + wingFlap);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(20,-10,28,-4,22,12); ctx.bezierCurveTo(14,8,6,6,0,0);
  ctx.fillStyle = `hsl(${hue+30},85%,60%)`; ctx.fill();
  ctx.strokeStyle = col2; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  // tail
  ctx.beginPath(); ctx.moveTo(14, 18); ctx.bezierCurveTo(28, 14, 36, 24, 30, 30);
  ctx.strokeStyle = col2; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
  // tail tip diamond
  ctx.save(); ctx.translate(30, 30); ctx.rotate(Math.PI/4);
  ctx.fillStyle = `hsl(${hue+40},90%,65%)`;
  ctx.fillRect(-4, -4, 8, 8); ctx.restore();

  // body
  ctx.beginPath(); ctx.ellipse(0, 10, 20, 22, 0, 0, Math.PI*2);
  const bg = ctx.createRadialGradient(-5, 0, 3, 0, 10, 25);
  bg.addColorStop(0, colL); bg.addColorStop(1, col);
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = col2; ctx.lineWidth = 1.5; ctx.stroke();

  // belly scales
  ctx.fillStyle = 'rgba(255,220,180,0.5)';
  ctx.beginPath(); ctx.ellipse(0, 14, 12, 14, 0, 0, Math.PI*2); ctx.fill();

  // head
  ctx.beginPath(); ctx.ellipse(0, -14, 18, 16, 0, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = col2; ctx.lineWidth = 1.5; ctx.stroke();

  // horns
  ctx.fillStyle = `hsl(${hue+50},70%,75%)`;
  ctx.strokeStyle = col2; ctx.lineWidth = 1;
  [[-8,-28],[8,-28]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(dx,dy); ctx.lineTo(dx-3,dy-12); ctx.lineTo(dx+3,dy-12); ctx.closePath();
    ctx.fill(); ctx.stroke();
  });

  // nostrils
  ctx.fillStyle = col2;
  ctx.beginPath(); ctx.ellipse(-4, -8, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -8, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();

  if (!sleeping) {
    drawCuteEyes(ctx, -7, -17, 7, -17, 5.5, petEyeState);
    drawCuteMouth(ctx, 0, -8, sleeping, pet.happy);
    // tiny fire breath
    if (pet.happy > 70) {
      const ff = ctx.createRadialGradient(0, -6, 1, 2, -4, 8);
      ff.addColorStop(0, 'rgba(255,200,0,0.9)'); ff.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.beginPath(); ctx.ellipse(10, -6, 8, 4, 0.3, 0, Math.PI*2);
      ctx.fillStyle = ff; ctx.fill();
    }
  } else {
    drawSleepEyes(ctx, -7, -17, 7, -17);
    drawZzz(ctx, 22, -30);
  }
  ctx.restore();
}

// ── Lv.10~19: Ninja ── 酷帥忍者獸
function drawNinja(ctx, cx, cy, sleeping, level) {
  const t = Date.now() / 1000;
  const bob = Math.sin(t * 2.5) * 4;
  const scarfWave = Math.sin(t * 3) * 0.15;
  // colour shifts per level 10-19
  const hues = [200,220,240,260,280,300,320,340,360,20];
  const h = hues[(level - 10) % hues.length];
  const col  = `hsl(${h},80%,50%)`;
  const colD = `hsl(${h},80%,32%)`;
  const colL = `hsl(${h},80%,72%)`;

  ctx.save(); ctx.translate(cx, cy + bob);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, 32, 18, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();

  // scarf tails (behind)
  ctx.save(); ctx.rotate(scarfWave - 0.1);
  ctx.beginPath(); ctx.moveTo(8, -4); ctx.bezierCurveTo(26, 2, 32, 18, 24, 28);
  ctx.strokeStyle = `hsl(${h},90%,55%)`; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();
  ctx.restore();

  // body - sleek
  ctx.beginPath(); ctx.ellipse(0, 10, 17, 22, 0, 0, Math.PI*2);
  const bg = ctx.createLinearGradient(-17, -12, 17, 32);
  bg.addColorStop(0, '#2d2d2d'); bg.addColorStop(1, '#111');
  ctx.fillStyle = bg; ctx.fill();

  // armour plate
  ctx.beginPath(); ctx.ellipse(0, 8, 10, 14, 0, 0, Math.PI*2);
  const ag = ctx.createLinearGradient(-10, -6, 10, 22);
  ag.addColorStop(0, colL); ag.addColorStop(1, col);
  ctx.fillStyle = ag; ctx.fill();

  // head
  ctx.beginPath(); ctx.ellipse(0, -14, 16, 15, 0, 0, Math.PI*2);
  ctx.fillStyle = '#222'; ctx.fill();

  // mask
  ctx.beginPath(); ctx.rect(-16, -10, 32, 10); ctx.arc(0, -10, 16, 0, Math.PI); // bottom half mask
  ctx.fillStyle = col; ctx.fill();

  // headband
  ctx.beginPath(); ctx.rect(-16, -20, 32, 7);
  ctx.fillStyle = colD; ctx.fill();
  // headband symbol
  ctx.fillStyle = colL; ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('忍', 0, -14);

  // scarf front
  ctx.save(); ctx.rotate(scarfWave);
  ctx.beginPath(); ctx.moveTo(-8, -4); ctx.bezierCurveTo(-20, 4, -22, 18, -14, 26);
  ctx.strokeStyle = `hsl(${h},90%,55%)`; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();
  ctx.restore();

  // arms with shuriken
  ctx.strokeStyle = '#333'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-15, 2); ctx.lineTo(-28, -6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(15, 2); ctx.lineTo(28, -6); ctx.stroke();
  // shuriken
  if (!sleeping) {
    const spin = t * 4;
    [[-30,-8],[30,-8]].forEach(([sx,sy])=>{
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(spin);
      for (let i=0;i<4;i++){
        ctx.save(); ctx.rotate(i*Math.PI/2);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-4,-7); ctx.lineTo(0,-4); ctx.lineTo(4,-7); ctx.closePath();
        ctx.fillStyle = '#aaa'; ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    });
  }

  if (!sleeping) {
    // ninja eyes - narrow cool eyes
    ctx.fillStyle = colL;
    ctx.beginPath(); ctx.ellipse(-6, -16, petEyeState.blink>0?5:5, petEyeState.blink>0?1:3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, -16, petEyeState.blink>0?5:5, petEyeState.blink>0?1:3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    drawSleepEyes(ctx, -6, -16, 6, -16);
    drawZzz(ctx, 22, -32);
  }
  ctx.restore();
}

// ── Lv.20: God Beast ── 神獸降臨
function drawGodBeast(ctx, cx, cy, sleeping) {
  const t = Date.now() / 1000;
  const bob = Math.sin(t * 1.2) * 3;
  const pulse = (Math.sin(t * 2) + 1) / 2;

  ctx.save(); ctx.translate(cx, cy + bob);

  // outer rainbow aura rings
  for (let r = 42; r >= 30; r -= 4) {
    const hh = (t * 80 + r * 12) % 360;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.strokeStyle = `hsla(${hh},100%,65%,${0.15 + pulse*0.1})`; ctx.lineWidth = 3; ctx.stroke();
  }

  // orbiting stars
  for (let i=0;i<5;i++){
    const a = t * 1.2 + i * Math.PI*2/5;
    const sx = Math.cos(a)*34, sy = Math.sin(a)*28;
    const sh = (t*60 + i*72) % 360;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(t*3+i);
    for (let p=0;p<5;p++){
      const pa = p*Math.PI*2/5 - Math.PI/2;
      const r1=5, r2=2;
      p===0 ? ctx.moveTo(Math.cos(pa)*r1,Math.sin(pa)*r1) : ctx.lineTo(Math.cos(pa)*r1,Math.sin(pa)*r1);
      const pb = pa + Math.PI/5;
      ctx.lineTo(Math.cos(pb)*r2,Math.sin(pb)*r2);
    }
    ctx.closePath();
    ctx.fillStyle = `hsl(${sh},100%,70%)`; ctx.fill();
    ctx.restore();
  }

  // body - majestic
  ctx.beginPath(); ctx.ellipse(0, 10, 22, 26, 0, 0, Math.PI*2);
  const bg = ctx.createRadialGradient(-6,-4,3,0,10,28);
  bg.addColorStop(0, '#fff5cc'); bg.addColorStop(0.5, '#ffd700'); bg.addColorStop(1, '#b8860b');
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = '#daa520'; ctx.lineWidth = 2; ctx.stroke();

  // divine markings
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-8, 4); ctx.lineTo(0, -6); ctx.lineTo(8, 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10, 14); ctx.lineTo(0, 22); ctx.lineTo(10, 14); ctx.stroke();

  // majestic mane
  for (let i=0;i<12;i++){
    const a = (i/12)*Math.PI*2 + t*0.3;
    const mx = Math.cos(a)*24, my = Math.sin(a)*24 - 8;
    const mh = (t*40 + i*30) % 360;
    ctx.beginPath(); ctx.arc(mx, my, 6+pulse*2, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${mh},100%,70%,0.8)`; ctx.fill();
  }

  // head
  ctx.beginPath(); ctx.ellipse(0, -16, 19, 18, 0, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = '#daa520'; ctx.lineWidth = 2; ctx.stroke();

  // divine crown
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#daa520'; ctx.lineWidth = 1.5;
  for (let i=0;i<5;i++){
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    const px = Math.cos(a)*12, py = Math.sin(a)*10 - 30;
    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${(t*60+i*72)%360},100%,70%)`; ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(-14,-26); ctx.lineTo(-10,-36); ctx.lineTo(-6,-26);
  ctx.lineTo(-3,-32); ctx.lineTo(0,-26); ctx.lineTo(3,-32);
  ctx.lineTo(6,-26); ctx.lineTo(10,-36); ctx.lineTo(14,-26);
  ctx.fillStyle = '#ffd700'; ctx.fill(); ctx.strokeStyle = '#b8860b'; ctx.stroke();

  if (!sleeping) {
    // glowing divine eyes
    const eyeGlow = ctx.createRadialGradient(-7,-18,1,-7,-18,7);
    eyeGlow.addColorStop(0,'#fff'); eyeGlow.addColorStop(0.4,`hsl(${(t*60)%360},100%,70%)`); eyeGlow.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(-7,-18,7,0,Math.PI*2); ctx.fillStyle=eyeGlow; ctx.fill();
    const eyeGlow2 = ctx.createRadialGradient(7,-18,1,7,-18,7);
    eyeGlow2.addColorStop(0,'#fff'); eyeGlow2.addColorStop(0.4,`hsl(${(t*60+180)%360},100%,70%)`); eyeGlow2.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(7,-18,7,0,Math.PI*2); ctx.fillStyle=eyeGlow2; ctx.fill();
    // pupils
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(-7,-18,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-18,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-8.5,-19.5,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5.5,-19.5,1,0,Math.PI*2); ctx.fill();
    drawCuteMouth(ctx, 0, -8, false, 100);
  } else {
    drawSleepEyes(ctx, -7, -18, 7, -18);
    drawZzz(ctx, 24, -36);
  }
  ctx.restore();
}

// ── Helper: Cute Eyes ──
function drawCuteEyes(ctx, x1, y1, x2, y2, r, es) {
  [x1,x2].forEach((x,i)=> {
    const y = i===0?y1:y2;
    const scaleY = es.blink>0 ? 0.08 : 1;
    // white
    ctx.beginPath(); ctx.ellipse(x, y, r, r*scaleY, 0, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1; ctx.stroke();
    if (es.blink===0) {
      // pupil
      const px=x+es.lookX*0.4, py=y+es.lookY*0.4;
      ctx.beginPath(); ctx.arc(px,py,r*0.5,0,Math.PI*2);
      ctx.fillStyle='#1a1a2e'; ctx.fill();
      // shine
      ctx.beginPath(); ctx.arc(px-r*0.18,py-r*0.18,r*0.18,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
      // small second shine
      ctx.beginPath(); ctx.arc(px+r*0.1,py+r*0.1,r*0.09,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    }
  });
}

// ── Helper: Cute Mouth ──
function drawCuteMouth(ctx, x, y, sleeping, happy) {
  ctx.strokeStyle='#444'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();
  if (sleeping) {
    ctx.moveTo(x-4,y); ctx.lineTo(x+4,y);
  } else if (happy > 70) {
    // big happy w-mouth
    ctx.moveTo(x-7,y-1); ctx.quadraticCurveTo(x-4,y+6,x,y+2); ctx.quadraticCurveTo(x+4,y+6,x+7,y-1);
  } else if (happy > 40) {
    ctx.moveTo(x-5,y); ctx.quadraticCurveTo(x,y+5,x+5,y);
  } else {
    ctx.moveTo(x-5,y+4); ctx.quadraticCurveTo(x,y,x+5,y+4);
  }
  ctx.stroke();
}

function drawEyes(ctx, x1, y1, x2, y2, r, es) {
  drawCuteEyes(ctx, x1, y1, x2, y2, r, es);
}

function drawSleepEyes(ctx, x1, y1, x2, y2) {
  ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.lineCap='round';
  [x1,x2].forEach((x,i)=> {
    const y=i===0?y1:y2;
    ctx.beginPath(); ctx.moveTo(x-5,y); ctx.quadraticCurveTo(x,y+4,x+5,y); ctx.stroke();
  });
}

function drawMouth(ctx, x, y, sleeping, happy) {
  drawCuteMouth(ctx, x, y, sleeping, happy);
}

function drawZzz(ctx, x, y) {
  const t = Date.now() / 1000;
  const sizes = [10,8,6];
  sizes.forEach((s,i)=> {
    const ox = Math.sin(t*0.8+i)*3;
    const oy = -i*10 + Math.sin(t+i)*3;
    ctx.font = `bold ${s}px Nunito`;
    ctx.fillStyle = `rgba(100,100,200,${0.7-i*0.15})`;
    ctx.fillText('z', x+ox, y+oy);
  });
}

// give 1 exp per 10 steps automatically
let lastStepForPet = 0;
function checkPetStepReward(steps) {
  const earned = Math.floor((steps - lastStepForPet) / 10);
  if (earned > 0) {
    lastStepForPet += earned * 10;
    pet.exp += earned;
    pet.happy = Math.min(100, pet.happy + earned);
    checkLevelUp();
    updatePetUI();
  }
}

// patch into step update
const _origOnBTData = onBTData;
// We'll hook step updates via the existing stepCount variable
const _petStepObserver = setInterval(()=>{
  checkPetStepReward(stepCount);
}, 2000);

updatePetUI();
drawPet();

function calcDistance() {
  if (coords.length < 2) return stepCount * 0.6;
  let total = 0;
  for (let i = 1; i < coords.length; i++) total += haversine(coords[i-1], coords[i]);
  return total;
}

function haversine([la1,lo1],[la2,lo2]) {
  const R = 6371000, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showModal() {
  const dist = Math.max(Math.round(calcDistance()), Math.round(stepCount * 0.6));
  const mins = startTime ? Math.round((Date.now()-startTime)/60000) : 0;
  document.getElementById('m-steps').textContent = stepCount;
  document.getElementById('m-dist').textContent  = dist;
  document.getElementById('m-pts').textContent   = coords.length;
  document.getElementById('m-time').textContent  = mins;
  document.getElementById('sim-note').style.display = (coords.length === 0 && stepCount === 0) ? 'none' : isSimMode ? 'block' : 'none';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function resetAll() {
  coords = []; stepCount = 0; startTime = null; isWalking = false;
  stopSimulate();
  if (gpsWatcher !== null) { navigator.geolocation.clearWatch(gpsWatcher); gpsWatcher = null; }
  if (btDevice && btDevice.gatt.connected) btDevice.gatt.disconnect();
  polyline.setLatLngs([]);
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map.removeLayer(endMarker);   endMarker = null; }
  simLat = 25.0330; simLng = 121.5335;
  ['step-display','dist-display','pts-display'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('state-display').textContent = '待機';
  document.getElementById('state-sub').textContent = '按開始走路';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  document.getElementById('btn-sim').disabled   = true;
  document.getElementById('btn-reset').disabled = true;
  document.getElementById('btn-sim').textContent = '模擬走路';
  document.getElementById('sim-pill').style.display = 'none';
  document.getElementById('gps-pill').className = 'status-pill';
  document.getElementById('gps-pill').innerHTML = '<div class="dot"></div><span>GPS 待機</span>';
  document.getElementById('bt-pill').className  = 'status-pill';
  document.getElementById('bt-pill').innerHTML  = '<div class="dot"></div><span>micro:bit 未連線</span>';
  document.getElementById('log').innerHTML = '<div class="log-item log-info">已重設，等待開始走路...</div>';
  map.setView([simLat, simLng], 17);
}
